name: Build & Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GO_VERSION: '1.25.7'

jobs:
  # ─── Linux deb/rpm (amd64 + arm64) ────────────────────────────────
  linux-packages:
    strategy:
      matrix:
        include:
          - goarch: amd64
            pkg_arch: amd64
          - goarch: arm64
            pkg_arch: arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}"
          COMMIT="$(echo $GITHUB_SHA | cut -c1-7)"
          LDFLAGS="-s -w -X bandwidth-monitor/version.Commit=${COMMIT}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            LDFLAGS="${LDFLAGS} -X bandwidth-monitor/version.Version=${{ github.ref_name }}"
          fi
          go build -ldflags="${LDFLAGS}" -o bandwidth-monitor .

      - name: Prepare packaging service file
        run: |
          sed -e 's|/opt/bandwidth-monitor/bandwidth-monitor|/usr/bin/bandwidth-monitor|' \
              -e 's|EnvironmentFile=/opt/bandwidth-monitor/.env|EnvironmentFile=-/etc/bandwidth-monitor/env|' \
              -e 's|WorkingDirectory=/opt/bandwidth-monitor|WorkingDirectory=/var/lib/bandwidth-monitor|' \
              -e 's|ReadOnlyPaths=/opt/bandwidth-monitor||' \
              bandwidth-monitor.service > bandwidth-monitor-pkg.service

      - name: Build deb
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('0.0.0-{0}', github.sha) }}
          GOARCH: ${{ matrix.pkg_arch }}
        run: |
          export VERSION="${VERSION#v}"
          nfpm package -p deb -f nfpm.yaml

      - name: Build rpm
        env:
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('0.0.0-{0}', github.sha) }}
          GOARCH: ${{ matrix.pkg_arch }}
        run: |
          export VERSION="${VERSION#v}"
          nfpm package -p rpm -f nfpm.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.goarch }}
          path: |
            *.deb
            *.rpm

  # ─── OpenWrt (multiple targets) ────────────────────────────────────
  openwrt:
    strategy:
      matrix:
        include:
          # ── OpenWrt 23.05 (stable, ipk) ──
          - arch: x86_64
            goarch: amd64
            pkg_format: ipk
          - arch: aarch64_generic
            goarch: arm64
            pkg_format: ipk
          - arch: mips_24kc
            goarch: mips
            gomips: softfloat
            pkg_format: ipk
          - arch: mipsel_24kc
            goarch: mipsle
            gomips: softfloat
            pkg_format: ipk
          - arch: aarch64_cortex-a53
            goarch: arm64
            pkg_format: ipk
          # ── OpenWrt SNAPSHOT (nightly, apk) ──
          - arch: x86_64-snapshot
            goarch: amd64
            pkg_format: apk
          - arch: aarch64_generic-snapshot
            goarch: arm64
            pkg_format: apk
          - arch: aarch64_cortex-a53-snapshot
            goarch: arm64
            pkg_format: apk

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
        run: |
          COMMIT="$(echo $GITHUB_SHA | cut -c1-7)"
          LDFLAGS="-s -w -X bandwidth-monitor/version.Commit=${COMMIT}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            LDFLAGS="${LDFLAGS} -X bandwidth-monitor/version.Version=${{ github.ref_name }}"
          fi
          go build -ldflags="${LDFLAGS}" -o bandwidth-monitor .
          file bandwidth-monitor
          echo "BINARY=${{ github.workspace }}/bandwidth-monitor" >> $GITHUB_ENV

      - name: Package for OpenWrt
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0_git$(date +%Y%m%d)"
          fi
          ARCH="${{ matrix.arch }}"
          ARCH="${ARCH%-snapshot}"
          WORKSPACE="${{ github.workspace }}"
          PKG_FORMAT="${{ matrix.pkg_format }}"

          PKG_DIR=$(mktemp -d)
          BUILD_DIR=$(mktemp -d)
          mkdir -p "$PKG_DIR/usr/bin"
          mkdir -p "$PKG_DIR/etc/bandwidth-monitor"
          mkdir -p "$PKG_DIR/etc/init.d"
          mkdir -p "$WORKSPACE/pkg-out"

          cp "$BINARY" "$PKG_DIR/usr/bin/bandwidth-monitor"
          cp "$WORKSPACE/env.example" "$PKG_DIR/etc/bandwidth-monitor/env"
          cp "$WORKSPACE/packaging/openwrt-files/bandwidth-monitor.init" "$PKG_DIR/etc/init.d/bandwidth-monitor"
          chmod 755 "$PKG_DIR/usr/bin/bandwidth-monitor" "$PKG_DIR/etc/init.d/bandwidth-monitor"
          chmod 600 "$PKG_DIR/etc/bandwidth-monitor/env"

          if [ "$PKG_FORMAT" = "apk" ]; then
            # Download apk-tools v3 static binary for creating APK v3 packages
            wget -q "https://dl-cdn.alpinelinux.org/alpine/latest-stable/main/x86_64/APKINDEX.tar.gz" -O /tmp/APKINDEX.tar.gz
            APK_STATIC_VER=$(tar xzf /tmp/APKINDEX.tar.gz -O APKINDEX 2>/dev/null | awk '/^P:apk-tools-static$/{found=1} found && /^V:/{print $0; exit}' | cut -d: -f2)
            echo "Latest apk-tools-static version: $APK_STATIC_VER"
            wget -q "https://dl-cdn.alpinelinux.org/alpine/latest-stable/main/x86_64/apk-tools-static-${APK_STATIC_VER}.apk" -O /tmp/apk-static.apk
            cd /tmp && tar xzf apk-static.apk sbin/apk.static && cd "$WORKSPACE"
            APK=/tmp/sbin/apk.static

            BUILDDATE=$(date +%s)

            APK_FILE="$WORKSPACE/pkg-out/bandwidth-monitor-${VERSION}-r1_${ARCH}.apk"
            cd "$PKG_DIR"
            $APK mkpkg \
              -I "name:bandwidth-monitor" \
              -I "version:${VERSION}-r1" \
              -I "description:Real-time network monitoring dashboard with embedded web UI" \
              -I "url:https://github.com/awlx/bandwidth-monitor" \
              -I "build-time:${BUILDDATE}" \
              -I "arch:${ARCH}" \
              -I "license:ISC" \
              -I "maintainer:Annika Wickert <awlx@users.noreply.github.com>" \
              -F "$PKG_DIR" \
              -o "$APK_FILE"
            ls -lh "$APK_FILE"
            file "$APK_FILE"
          else
            mkdir -p "$PKG_DIR/CONTROL"
            printf '%s\n' \
              "Package: bandwidth-monitor" \
              "Version: ${VERSION}" \
              "Architecture: ${ARCH}" \
              "Maintainer: Annika Wickert <awlx@users.noreply.github.com>" \
              "Section: net" \
              "Description: Real-time network monitoring dashboard with embedded web UI" \
              > "$PKG_DIR/CONTROL/control"

            echo "/etc/bandwidth-monitor/env" > "$PKG_DIR/CONTROL/conffiles"

            tar czf "$BUILD_DIR/control.tar.gz" -C "$PKG_DIR/CONTROL" .
            tar czf "$BUILD_DIR/data.tar.gz" --owner=0 --group=0 -C "$PKG_DIR" usr etc
            echo "2.0" > "$BUILD_DIR/debian-binary"

            IPK_FILE="$WORKSPACE/pkg-out/bandwidth-monitor_${VERSION}_${ARCH}.ipk"
            cd "$BUILD_DIR"
            # OpenWrt ipk is a tar.gz containing debian-binary, control.tar.gz, data.tar.gz
            tar czf "$IPK_FILE" --owner=0 --group=0 ./debian-binary ./control.tar.gz ./data.tar.gz
            file "$IPK_FILE"
          fi

      - name: Upload OpenWrt package
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.arch }}
          path: pkg-out/*

  # ─── GitHub Release (tags only) ────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-packages, openwrt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.ipk
            artifacts/**/*.apk
            artifacts/**/*.tar.gz

  # ─── APT Repository (GitHub Pages) ─────────────────────────────────
  # Builds a Debian/Ubuntu apt repository from the .deb artifacts and
  # deploys to gh-pages so users can: apt install bandwidth-monitor
  apt-repo:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | awk '/^sec/{print $2}' | cut -d/ -f2 | head -1)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Build APT repository
        run: |
          mkdir -p repo/pool/main repo/dists/stable/main/binary-amd64 repo/dists/stable/main/binary-arm64

          # Collect all .deb files into pool
          find artifacts -name '*.deb' -exec cp {} repo/pool/main/ \;
          echo "Packages in pool:"
          ls -lh repo/pool/main/

          # Generate Packages indices
          cd repo
          for arch in amd64 arm64; do
            dpkg-scanpackages --arch "$arch" pool/ > "dists/stable/main/binary-${arch}/Packages"
            gzip -k "dists/stable/main/binary-${arch}/Packages"
          done

          # Generate Release file
          cat > dists/stable/Release << RELEASE
          Origin: bandwidth-monitor
          Label: bandwidth-monitor
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Bandwidth Monitor APT Repository
          RELEASE

          # Add checksums
          cd dists/stable
          apt-ftparchive release . >> Release

          # GPG sign
          gpg --batch --yes --default-key "$GPG_KEY_ID" -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" --clearsign -o InRelease Release

          cd "$GITHUB_WORKSPACE/repo"

          # Export public key for users
          gpg --armor --export "$GPG_KEY_ID" > bandwidth-monitor.gpg.key

          # Create an index page
          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html><head><title>bandwidth-monitor APT Repository</title></head>
          <body>
          <h1>bandwidth-monitor APT Repository</h1>
          <h2>Quick Install (Debian/Ubuntu)</h2>
          <pre>
          curl -fsSL https://awlx.github.io/bandwidth-monitor/bandwidth-monitor.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/bandwidth-monitor.gpg
          echo "deb [signed-by=/etc/apt/keyrings/bandwidth-monitor.gpg] https://awlx.github.io/bandwidth-monitor stable main" | sudo tee /etc/apt/sources.list.d/bandwidth-monitor.list
          sudo apt update
          sudo apt install bandwidth-monitor
          </pre>
          </body></html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true